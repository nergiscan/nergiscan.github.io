<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #f2efde;
    font-family: 'Montserrat', sans-serif;
    color: #6b5d3a;
    min-height: 100vh;
  }
  .page {
    max-width: 520px;
    margin: 0 auto;
    background: #f2efde;
    min-height: 100vh;
    box-shadow: 0 0 40px rgba(0,0,0,0.06);
  }
  .invite-image {
    width: 100%;
    display: block;
  }
  .info {
    padding: 50px 28px 60px;
    text-align: center;
  }
  .countdown {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 56px;
  }
  .unit { min-width: 62px; }
  .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 400;
    color: #5d4f30;
    line-height: 1;
  }
  .unit-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: #8a7a4f;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .event-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 4px;
    color: #5d4f30;
    text-transform: uppercase;
    margin-bottom: 12px;
    white-space: nowrap;
  }
  .event-title .dash {
    margin: 0 8px;
    color: #8a7a4f;
  }
  .location-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: #5d4f30;
    margin-bottom: 10px;
  }
  .location-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: #8a7a4f;
    margin-bottom: 28px;
    text-transform: uppercase;
  }
  .map-wrap {
    width: 100%;
    max-width: 440px;
    margin: 0 auto 22px;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(93, 79, 48, 0.15);
    border: 1px solid rgba(160, 140, 90, 0.3);
  }
  .map-wrap iframe {
    display: block;
    width: 100%;
    height: 260px;
    border: 0;
  }
  .location-btn {
    display: inline-block;
    padding: 14px 36px;
    background: transparent;
    color: #5d4f30;
    border: 1px solid #b0a070;
    border-radius: 2px;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .location-btn:hover {
    background: #b0a070;
    color: #f2efde;
  }
  @media (max-width: 420px) {
    .num { font-size: 34px; }
    .unit { min-width: 52px; }
    .countdown { gap: 8px; }
    .map-wrap iframe { height: 220px; }
    .event-title { font-size: 11px; letter-spacing: 3px; }
    .event-title .dash { margin: 0 5px; }
    .location-name { font-size: 21px; }
  }
</style>

<body>
  <div class="page">
    <img src="davetiye.png" alt="Nergis & Can Davetiye" class="invite-image">

    <div class="info">
      <div class="countdown">
        <div class="unit"><div class="num" id="days">00</div><div class="unit-label">Gün</div></div>
        <div class="unit"><div class="num" id="hours">00</div><div class="unit-label">Saat</div></div>
        <div class="unit"><div class="num" id="minutes">00</div><div class="unit-label">Dakika</div></div>
        <div class="unit"><div class="num" id="seconds">00</div><div class="unit-label">Saniye</div></div>
      </div>

      <div class="event-title">Nikah<span class="dash">—</span>23 Mayıs 2026<span class="dash">—</span>18:00</div>
      <div class="location-name">Antalya Kartpostalı</div>
      <div class="location-sub">Şirinyalı, Lara Cd. Muratpaşa / Antalya</div>

      <div class="map-wrap">
        <iframe
          src="https://maps.google.com/maps?q=36.86257483601452,30.726320613140093&hl=tr&z=17&output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen></iframe>
      </div>

      <a href="https://www.google.com/maps/search/?api=1&query=36.86257483601452,30.726320613140093" target="_blank" rel="noopener" class="location-btn">Konuma Git</a>
    </div>
  </div>

<script>
  const targetDate = new Date('2026-05-23T18:00:00+03:00').getTime();

  function updateCountdown() {
    const now = new Date().getTime();
    const diff = targetDate - now;

    if (diff <= 0) {
      ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).textContent = '00');
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const minutes = Math.floor((diff % 3600000) / 60000);
    const seconds = Math.floor((diff % 60000) / 1000);

    document.getElementById('days').textContent = String(days).padStart(2, '0');
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
