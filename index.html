<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  font-family:'Montserrat',sans-serif;
  color:#6b5d3a;
  background-image:url('bg-texture.jpeg');
  background-repeat:repeat-y;
  background-position:top center;
  background-size:520px auto;
  background-color:#f2efde;
}

.page{
  max-width:520px;
  margin:0 auto;
}

.invite-image{
  width:100%;
  display:block;
}

.info{
  padding:50px 28px 70px;
  text-align:center;
}

.countdown{
  display:flex;
  justify-content:center;
  gap:16px;
  margin-bottom:50px;
}

.unit{min-width:60px}

.num{
  font-family:'Cormorant Garamond',serif;
  font-size:34px;
}

.unit-label{
  font-size:10px;
  opacity:.7;
}

.event-title{
  font-size:12px;
  letter-spacing:3px;
  margin-bottom:10px;
}

.location-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  margin-bottom:8px;
}

.location-sub{
  font-size:10px;
  opacity:.7;
  margin-bottom:24px;
}

.map-wrap{
  max-width:420px;
  margin:0 auto 24px;
  border:1px solid rgba(160,140,90,.25);
  filter:sepia(.2) brightness(.98);
}

.map-wrap iframe{
  width:100%;
  height:220px;
  border:0;
}

.location-btn{
  display:inline-block;
  padding:12px 28px;
  border:1px solid #b0a070;
  text-decoration:none;
  font-size:11px;
  letter-spacing:3px;
  color:#5d4f30;
  transition:.25s;
}

.location-btn:hover{
  background:#b0a070;
  color:#f2efde;
}

@media(max-width:420px){
  .num{font-size:28px}
  .countdown{gap:10px}
  .map-wrap iframe{height:200px}
}
</style>
</head>

<body>

<div class="page">

  <img src="davetiye.png" class="invite-image">

  <div class="info">

    <div class="countdown">
      <div class="unit"><div class="num" id="days">00</div><div class="unit-label">Gün</div></div>
      <div class="unit"><div class="num" id="hours">00</div><div class="unit-label">Saat</div></div>
      <div class="unit"><div class="num" id="minutes">00</div><div class="unit-label">Dakika</div></div>
      <div class="unit"><div class="num" id="seconds">00</div><div class="unit-label">Saniye</div></div>
    </div>

    <div class="event-title">Nikah — 23 Mayıs 2026 — 18:00</div>
    <div class="location-name">Antalya Kartpostalı</div>
    <div class="location-sub">Muratpaşa / Antalya</div>

    <div class="map-wrap">
      <iframe src="https://maps.google.com/maps?q=36.86257483601452,30.726320613140093&hl=tr&z=17&output=embed"></iframe>
    </div>

    <a href="https://www.google.com/maps/search/?api=1&query=36.86257483601452,30.726320613140093" target="_blank" class="location-btn">
      Konuma Git
    </a>

  </div>
</div>

<script>
const targetDate=new Date('2026-05-23T18:00:00+03:00').getTime();

function updateCountdown(){
  const now=Date.now();
  const diff=targetDate-now;
  if(diff<=0)return;

  document.getElementById('days').textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
  document.getElementById('hours').textContent=String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
  document.getElementById('minutes').textContent=String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
  document.getElementById('seconds').textContent=String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
